<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Square Crop</title>
  <script src="lib/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
    h1 { margin-bottom: 1.5rem; font-weight: 600; font-size: 1.75rem; }
    .container { width: 100%; max-width: 600px; background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .dropzone { border: 2px dashed #ccc; border-radius: 8px; padding: 2.5rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    .dropzone:hover, .dropzone.dragover { border-color: #0066ff; background: #f8f9ff; }
    .dropzone p { color: #666; }
    .dropzone .btn { display: inline-block; background: #0066ff; color: #fff; padding: 0.6rem 1.2rem; border-radius: 6px; margin-bottom: 0.5rem; font-weight: 500; }
    .dropzone input { display: none; }
    .status { margin: 1rem 0; padding: 0.75rem; border-radius: 6px; display: none; }
    .status.loading { display: block; background: #fff3cd; color: #856404; }
    .status.error { display: block; background: #f8d7da; color: #721c24; }
    .status.success { display: block; background: #d4edda; color: #155724; }
    .preview { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; justify-content: center; }
    .preview img, .preview canvas { max-width: 100%; max-height: 300px; border-radius: 8px; border: 1px solid #eee; }
    .preview div { text-align: center; }
    .preview label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #666; }
    .download-btn { display: inline-block; background: #28a745; color: #fff; padding: 0.75rem 1.5rem; border-radius: 6px; text-decoration: none; margin-top: 1rem; font-weight: 500; cursor: pointer; border: none; }
    .download-btn:hover { background: #218838; }
    .download-btn:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Face Square Crop</h1>
  <div class="container">
    <div class="dropzone" id="dropzone">
      <span class="btn">Upload Image</span>
      <p>or drag & drop a file here</p>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <div class="status" id="status"></div>
    <div class="preview" id="preview" style="display: none;">
      <div>
        <label>Original</label>
        <img id="originalImg">
      </div>
      <div>
        <label>Cropped</label>
        <canvas id="croppedCanvas"></canvas>
      </div>
    </div>
    <div style="text-align: center;">
      <button class="download-btn" id="downloadBtn" disabled>Download</button>
    </div>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');
    const originalImg = document.getElementById('originalImg');
    const croppedCanvas = document.getElementById('croppedCanvas');
    const downloadBtn = document.getElementById('downloadBtn');

    let currentFilename = '';
    let currentExtension = '';

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

    async function showStatus(msg, type) {
      status.textContent = msg;
      status.className = 'status ' + type;
    }

    async function handleFile(file) {
      currentFilename = file.name.replace(/\.[^/.]+$/, '');
      currentExtension = file.name.split('.').pop().toLowerCase();
      originalImg.src = URL.createObjectURL(file);
      
      showStatus('Loading models...', 'loading');
      
      try {
        await faceapi.nets.tinyFaceDetector.loadFromUri('model');
        showStatus('Detecting face...', 'loading');
        await processImage(originalImg);
        showStatus('Done!', 'success');
      } catch (err) {
        showStatus('Error: ' + err.message, 'error');
      }
    }

    async function processImage(imgEl) {
      const detections = await faceapi.detectAllFaces(imgEl, new faceapi.TinyFaceDetectorOptions());
      
      if (detections.length === 0) {
        throw new Error('No face detected');
      }

      const detection = detections[0].box;
      const imgWidth = imgEl.naturalWidth;
      const imgHeight = imgEl.naturalHeight;
      
      const faceCenterX = detection.x + detection.width / 2;
      const faceCenterY = detection.y + detection.height / 2;
      
      const squareSize = Math.min(imgWidth, imgHeight);
      
      let cropX = faceCenterX - squareSize / 2;
      let cropY = faceCenterY - squareSize / 2;
      
      cropX = Math.max(0, Math.min(cropX, imgWidth - squareSize));
      cropY = Math.max(0, Math.min(cropY, imgHeight - squareSize));
      
      const ctx = croppedCanvas.getContext('2d');
      croppedCanvas.width = squareSize;
      croppedCanvas.height = squareSize;
      ctx.drawImage(imgEl, cropX, cropY, squareSize, squareSize, 0, 0, squareSize, squareSize);
      
      preview.style.display = 'flex';
      downloadBtn.disabled = false;
    }

    downloadBtn.addEventListener('click', () => {
      const ext = currentExtension || 'png';
      const mimeType = ext === 'jpg' || ext === 'jpeg' ? 'image/jpeg' : 'image/png';
      const quality = ext === 'jpg' || ext === 'jpeg' ? 0.92 : undefined;
      
      croppedCanvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentFilename}-square.${ext}`;
        a.click();
        URL.revokeObjectURL(url);
      }, mimeType, quality);
    });
  </script>
</body>
</html>
